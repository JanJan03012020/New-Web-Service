services:
  - type: web
    name: pisonet-manager
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./pisonet.db
      - key: PYTHON_VERSION
        value: 3.12.0
